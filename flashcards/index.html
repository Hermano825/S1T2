<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcards - Estudos</title>
  <style>
    :root {
      --bg: #f4f1ea;
      --paper: #fffdf8;
      --ink: #1f2937;
      --muted: #6b7280;
      --line: #e7dcc7;
      --card-1: #fff6e9;
      --card-2: #eef8ff;
      --accent-1: #c2410c;
      --accent-2: #0369a1;
      --ok: #166534;
      --shadow: 0 18px 40px rgba(31, 41, 55, 0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 10%, #fff8ea 0%, transparent 35%),
        radial-gradient(circle at 90% 80%, #e5f4ff 0%, transparent 28%),
        var(--bg);
      display: flex;
      flex-direction: column;
    }

    .container {
      width: min(1050px, 92%);
      margin: 44px auto;
    }

    .header {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 32px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .header-icon {
      font-size: 48px;
    }

    .header-content h1 {
      font-size: 32px;
      margin-bottom: 4px;
    }

    .header-content p {
      color: var(--muted);
      font-size: 15px;
    }

    .back-link {
      margin-top: 16px;
      display: inline-block;
    }

    .back-link a {
      text-decoration: none;
      color: var(--accent-2);
      font-weight: 700;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: gap 0.2s;
    }

    .back-link a:hover {
      gap: 10px;
    }

    .panel {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
    }

    .card {
      border-radius: 18px;
      border: 1px solid var(--line);
      padding: 22px;
      text-decoration: none;
      color: inherit;
      transition: transform .18s ease, box-shadow .18s ease;
      box-shadow: 0 8px 24px rgba(31, 41, 55, 0.05);
      display: block;
      position: relative;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 14px 28px rgba(31, 41, 55, 0.12);
    }

    .card.sgu { background: var(--card-2); border-left: 4px solid var(--accent-2); }

    .badge {
      display: inline-block;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      padding: 6px 10px;
      margin-bottom: 12px;
      letter-spacing: .6px;
      background: rgba(3, 105, 161, .12);
      color: var(--accent-2);
    }

    .card h2 {
      font-size: 22px;
      margin-bottom: 8px;
    }

    .card p {
      color: #4b5563;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .cta {
      display: inline-block;
      font-weight: 700;
      font-size: 14px;
      color: var(--ok);
    }

    .footer {
      text-align: center;
      color: #6b7280;
      font-size: 13px;
      padding: 30px 0;
      margin-top: 40px;
      border-top: 1px solid var(--line);
    }

    @media (max-width: 640px) {
      .header { padding: 24px; }
      .container { margin: 22px auto; }
      .card h2 { font-size: 20px; }
      .header-icon { font-size: 36px; }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="header">
      <div class="header-icon">🎴</div>
      <div class="header-content">
        <h1>Flashcards - Prova</h1>
        <p>Revisão rápida com cartões interativos para memorização eficiente</p>
      </div>
    </div>

    <section class="panel" aria-label="Painel de temas">
      <a class="card sgu" href="sgu.html">
        <span class="badge">Nefrologia</span>
        <h2>SGU - Flashcards</h2>
        <p>Cartões de revisão para o módulo de Sistema Gênito Urinário.</p>
        <span class="cta">Abrir flashcards →</span>
      </a>
    </section>

    <div class="back-link">
      <a href="../index.html">← Voltar ao Hub Principal</a>
    </div>
  </main>

  <div class="footer">Flashcards para revisão rápida</div>
</body>
</html>
