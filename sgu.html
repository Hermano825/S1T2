    setQuestaoAtual(0);
    setRespostaSelecionada(null);

    setPontuacao(0);
    setQuestoesFeitasIdx([]);
    setQuizFinalizado(false);
    setSecaoAtiva("quiz");
  }

  function responder(idx) {
    if (respostaSelecionada !== null) return;
    setRespostaSelecionada(idx);
    setMostrarExplicacao(true);
    if (idx === QUESTOES[questaoAtual].correta) {
      setPontuacao((p) => p + 1);
    }
    setQuestoesFeitasIdx((prev) => [...prev, questaoAtual]);
  }

  function proximaQuestao() {
    if (questaoAtual < QUESTOES.length - 1) {
      setQuestaoAtual((q) => q + 1);
      setRespostaSelecionada(null);
      setMostrarExplicacao(false);
    } else {
      setQuizFinalizado(true);
    }

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
              {[
                { titulo: "🪨 LITÍASE RENAL", cor: "#b5541c", corC: "#fdf0e8", itens: ["Cristais: oxalato Ca²⁺, fosfato Ca²⁺, fosfato amônio", "Hipercalciúria + Hipocitratúria", "Hematúria NÃO-dismórfica", "Defesas: PTH, Calcitriol, THP/Uromodulina"] },
                { titulo: "⚡ IRA", cor: "#8b1a1a", corC: "#fceaea", itens: ["Débito < 0,5 mL/kg/h por >6h", "Causas: isquemia, toxinas, drogas", "Autorregulação: miogênica + TG + ↑AngII", "Reversível se tratada"] },
                { titulo: "🔄 DRC", cor: "#1a4a6b", corC: "#e8f0f8", itens: ["Dano estrutural ≥ 3 meses", "Causas: DM, HAS, glomerulopatias", "Ciclo: dano → inflamação → fibrose", "Complicações: anemia (↓EPO), doença óssea (↓calcitriol)"] },
                { titulo: "🦠 ITU", cor: "#2d6b1a", corC: "#e9f5e8", itens: ["Bactérias: pili → adesina → hemolisina → Fe²⁺", "Hematúria NÃO-dismórfica + leucocitúria", "Defesas: glicocálice, descamação, IgA, THP", "Fatores de risco: DM, cateter, obstrução"] },
              ].map((card, i) => (
                <div key={i} style={{ background: "white", borderRadius: 14, padding: 18, boxShadow: "0 2px 12px rgba(0,0,0,0.07)", borderTop: `4px solid ${card.cor}` }}>
                  <div style={{ fontWeight: "bold", color: card.cor, marginBottom: 10 }}>{card.titulo}</div>
                  {card.itens.map((it, j) => (
                    <div key={j} style={{ background: card.corC, borderRadius: 7, padding: "6px 10px", marginBottom: 5, fontSize: 12, color: "#333" }}>• {it}</div>
                  ))}
                </div>
              ))}
            </div>
            <div style={{ background: "#fff3cd", border: "2px solid #ffc107", borderRadius: 12, padding: 16, marginTop: 20, textAlign: "center" }}>
              <div style={{ fontWeight: "bold", color: "#856404", fontSize: 15 }}>⚠️ Atenção!</div>
              <div style={{ color: "#856404", fontSize: 13, marginTop: 4 }}>2 ou mais destes eventos podem ocorrer simultaneamente no mesmo paciente!</div>
            </div>
          </div>
        )}

        {/* QUIZ */}
        {secaoAtiva === "quiz" && (
          <div>
            {!quizFinalizado ? (
              <div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
                  <div style={{ fontSize: 14, color: "#555" }}>Questão {questaoAtual + 1} de {QUESTOES.length}</div>
                  <div style={{ background: "#0f3460", color: "white", borderRadius: 20, padding: "4px 14px", fontSize: 13 }}>
                    ✓ {pontuacao} pontos
                  </div>
                </div>
                <div style={{ background: "white", width: "100%", height: 6, borderRadius: 3, marginBottom: 20, overflow: "hidden" }}>
                  <div style={{ background: "#0f3460", height: "100%", width: `${((questaoAtual) / QUESTOES.length) * 100}%`, transition: "width 0.3s" }} />
                </div>
                <div style={{ background: "white", borderRadius: 16, padding: 28, boxShadow: "0 4px 20px rgba(0,0,0,0.1)", marginBottom: 20 }}>
                  <div style={{ fontSize: 15, color: "#222", lineHeight: 1.7, fontWeight: "bold", marginBottom: 24 }}>{q.enunciado}</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                    {q.opcoes.map((op, i) => {
                      let bg = "white", border = "2px solid #ddd", color2 = "#333";
                      if (respostaSelecionada !== null) {
                        if (i === q.correta) { bg = "#d4edda"; border = "2px solid #28a745"; color2 = "#155724"; }
                        else if (i === respostaSelecionada && i !== q.correta) { bg = "#f8d7da"; border = "2px solid #dc3545"; color2 = "#721c24"; }
                      } else if (respostaSelecionada === null) {
                        border = "2px solid #ddd";
                      }
                      return (
                        <button key={i} onClick={() => responder(i)} style={{ background: bg, border, borderRadius: 10, padding: "14px 18px", textAlign: "left", cursor: respostaSelecionada !== null ? "default" : "pointer", color: color2, fontSize: 13, lineHeight: 1.5, transition: "all 0.2s" }}>
                          <span style={{ fontWeight: "bold", marginRight: 8 }}>{["A", "B", "C", "D"][i]})</span> {op}
                        </button>
                      );
                    })}
                  </div>
                </div>
                {mostrarExplicacao && (
                  <div style={{ background: respostaSelecionada === q.correta ? "#d4edda" : "#fff3cd", border: `2px solid ${respostaSelecionada === q.correta ? "#28a745" : "#ffc107"}`, borderRadius: 14, padding: 20, marginBottom: 20 }}>
                    <div style={{ fontWeight: "bold", marginBottom: 8, color: respostaSelecionada === q.correta ? "#155724" : "#856404" }}>
                      {respostaSelecionada === q.correta ? "✅ Correto!" : "❌ Incorreto"} — Explicação:
                    </div>
                    <div style={{ fontSize: 13, color: "#333", lineHeight: 1.7 }}>{q.explicacao}</div>
                  </div>
                )}
                {mostrarExplicacao && (
                  <button onClick={proximaQuestao} style={{ background: "#0f3460", color: "white", border: "none", borderRadius: 12, padding: "14px 28px", cursor: "pointer", fontSize: 15, fontWeight: "bold", width: "100%" }}>
                    {questaoAtual < QUESTOES.length - 1 ? "Próxima questão →" : "Ver resultado final"}
                  </button>
                )}
              </div>
            ) : (
              <div style={{ textAlign: "center" }}>
                <div style={{ fontSize: 60, marginBottom: 16 }}>{pontuacao >= 6 ? "🏆" : pontuacao >= 4 ? "📚" : "💪"}</div>
                <div style={{ fontSize: 28, fontWeight: "bold", color: "#0f3460", marginBottom: 8 }}>Resultado Final</div>
                <div style={{ fontSize: 18, color: "#555", marginBottom: 24 }}>{pontuacao} de {QUESTOES.length} questões corretas</div>
                <div style={{ background: "white", borderRadius: 16, padding: 24, marginBottom: 24, boxShadow: "0 4px 20px rgba(0,0,0,0.1)" }}>
                  <div style={{ fontSize: 48, fontWeight: "bold", color: pontuacao >= 6 ? "#28a745" : pontuacao >= 4 ? "#ffc107" : "#dc3545" }}>
                    {Math.round((pontuacao / QUESTOES.length) * 100)}%
                  </div>
                  <div style={{ color: "#555", marginTop: 8 }}>
                    {pontuacao >= 6 ? "Excelente! Você domina o conteúdo do SGU!" : pontuacao >= 4 ? "Bom! Revise os temas que errou." : "Continue estudando! Revise todos os temas."}
                  </div>
                </div>
                <div style={{ display: "flex", gap: 12, justifyContent: "center" }}>
                  <button onClick={iniciarQuiz} style={{ background: "#0f3460", color: "white", border: "none", borderRadius: 12, padding: "14px 24px", cursor: "pointer", fontSize: 14, fontWeight: "bold" }}>
                    🔄 Refazer quiz
                  </button>
                  <button onClick={() => setSecaoAtiva("resumo")} style={{ background: "white", color: "#0f3460", border: "2px solid #0f3460", borderRadius: 12, padding: "14px 24px", cursor: "pointer", fontSize: 14, fontWeight: "bold" }}>
                    🗺 Ver mapa de revisão
                  </button>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
  </script>
</body>
</html>
